<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Magic Node Cabin Design</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<canvas id="canvas"></canvas>

<div id="welcome">
  <div id="welcomeBox">
    <h2>Magic Node Cabin Design</h2>
    <p>Dolap boyutlarını girin</p>
    <div class="field"><label>Genişlik (cm)</label><input type="number" id="mW" value="200"></div>
    <div class="field"><label>Yükseklik (cm)</label><input type="number" id="mH" value="240"></div>
    <div class="field"><label>Derinlik (cm)</label><input type="number" id="mD" value="60"></div>
    <div class="btns"><button class="ok" id="mCreate">Oluştur</button></div>
  </div>
</div>

<div id="hint">Bir panel seçmek için tıklayın</div>

<div id="dialog">
  <div id="dialogBox">
    <h3 id="dialogTitle"></h3>
    <input type="text" id="dialogInput">
    <div class="btns">
      <button class="cancel" id="dialogCancel">İptal</button>
      <button class="ok" id="dialogOk">Tamam</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<div id="calcPanel">
  <div id="calcHeader">HESAP MAKİNESİ</div>
  <input type="text" id="calcDisplay" readonly>
  <div id="calcGrid">
    <button class="clear" data-v="C">C</button>
    <button data-v="(">(</button>
    <button data-v=")">)</button>
    <button class="op" data-v="/">/</button>
    <button data-v="7">7</button>
    <button data-v="8">8</button>
    <button data-v="9">9</button>
    <button class="op" data-v="*">×</button>
    <button data-v="4">4</button>
    <button data-v="5">5</button>
    <button data-v="6">6</button>
    <button class="op" data-v="-">-</button>
    <button data-v="1">1</button>
    <button data-v="2">2</button>
    <button data-v="3">3</button>
    <button class="op" data-v="+">+</button>
    <button data-v="0" style="grid-column:span 2">0</button>
    <button data-v=".">.</button>
    <button data-v="⌫" style="background:#7f8c8d;color:#fff;border-color:#7f8c8d">⌫</button>
    <button class="op" data-v="=">=</button>
  </div>
</div>

<div id="exportModal">
  <div id="exportBox">
    <h3>Parça Listesi</h3>
    <div id="exportTable" style="overflow-y:auto;flex:1"></div>
    <div class="btns">
      <button class="cancel" id="exportClose">Kapat</button>
      <button class="ok" id="exportCsv">📥 CSV İndir</button>
    </div>
  </div>
</div>

<div id="topbar">
  <input type="number" id="multiCount" value="1" min="1" max="50" title="Çoklu sayı (1=tek)">
  <button data-type="raf"><span>▬</span> Raf</button>
  <button data-type="cekmece"><span>🗄</span> Çekmece</button>
  <button data-type="aski"><span>〰</span> Askı</button>
  <button data-type="dikme"><span>▮</span> Dikme</button>
  <div class="sep"></div>
  <button data-type="kapak-ic"><span>🚪</span> İç Kapak</button>
  <button data-type="kapak-dis"><span>🚪</span> Dış Kapak</button>
</div>

<div id="sidebar"><div class="title">Parçalar</div><ul id="treeList"></ul></div>

<div id="props"><div class="title">Özellikler</div><div id="propsContent"></div></div>

<div id="toolbar">
  <button id="toolSelect" class="active">✋ Seç</button>
  <button id="toolMove">✥ Taşı</button>
  <div class="sep"></div>
  <button id="btnExport">📊 Dışa Aktar</button>
  <div class="sep"></div>
  <button id="btnCalc">🔢 Hesap</button>
  <div class="sep"></div>
  <button id="btnNew">🔄 Yeni</button>
  <div class="sep"></div>
  <button id="btnSave">💾 Kaydet</button>
  <button id="btnLoad">📂 Aç</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/TransformControls.js"></script>

<script src="js/cabinet.js"></script>
<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
